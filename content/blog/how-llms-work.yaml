slug: how-llms-work
title: How Large Language Models Actually Work
excerpt: >-
  A plain-English tour of what happens between your prompt and the model's
  answer — prediction, training, and why LLMs sometimes get things confidently
  wrong.
date: "2026-07-10"
author: yydev
category: Fundamentals
featured: true
tags:
