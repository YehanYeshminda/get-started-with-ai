slug: sample-mcp-config
name: MCP Config Template
type: mcp
description: >
  Blank template for .cursor/mcp.json. Merge multiple MCP blocks from this catalog
  into one mcpServers object — don't paste separate JSON files on top of each other.
agents: [cursor, claude-code, windsurf, cline]
useCases: [general, cursor]
tags: [mcp, configuration, template]
related: [mcp-github, mcp-filesystem, mcp-playwright]
featured: false
snippet: |
  {
    "mcpServers": {
      "server-name": {
        "command": "npx",
        "args": ["-y", "package-name"],
        "env": {
          "API_KEY": "your-key-here"
        }
      }
    }
  }
